name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Run tests
        run: go test -v -count=1 ./...
      - name: Vet
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Build
        run: go build -o baize-wiki ./cmd/baize-wiki
      - name: Cross-compile (make cross)
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/baize-wiki-linux-amd64 ./cmd/baize-wiki
          GOOS=linux GOARCH=arm64 go build -o bin/baize-wiki-linux-arm64 ./cmd/baize-wiki
          GOOS=darwin GOARCH=amd64 go build -o bin/baize-wiki-darwin-amd64 ./cmd/baize-wiki
          GOOS=darwin GOARCH=arm64 go build -o bin/baize-wiki-darwin-arm64 ./cmd/baize-wiki
          GOOS=windows GOARCH=amd64 go build -o bin/baize-wiki-windows-amd64.exe ./cmd/baize-wiki
