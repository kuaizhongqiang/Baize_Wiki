name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run tests
        run: go test -v -count=1 ./...
      - name: Vet
        run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: go build -o baize-wiki ./cmd/baize-wiki
      - name: Cross-compile (make cross)
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/baize-wiki-linux-amd64 ./cmd/baize-wiki
          GOOS=linux GOARCH=arm64 go build -o bin/baize-wiki-linux-arm64 ./cmd/baize-wiki
          GOOS=darwin GOARCH=amd64 go build -o bin/baize-wiki-darwin-amd64 ./cmd/baize-wiki
          GOOS=darwin GOARCH=arm64 go build -o bin/baize-wiki-darwin-arm64 ./cmd/baize-wiki
          GOOS=windows GOARCH=amd64 go build -o bin/baize-wiki-windows-amd64.exe ./cmd/baize-wiki

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
