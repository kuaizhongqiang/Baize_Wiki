# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/ for reference.

version: "2"

run:
  go: "1.25"
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  exclusions:
    rules:
      - path: ".*_test\\.go"
        linters:
          - errcheck
